<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>defimacro</title>
  <script src="login.js?v=16"></script>
  <link rel="stylesheet" href="styles.css?v=16">
  <link rel="stylesheet" href="asset.css?v=16">
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <header>
    <div class="header-left">
      <a href="index.html" class="logo-link"><h1 class="logo"><span class="logo-defi">defi</span>macro</h1></a>
    </div>
    <nav>
      <a href="index.html" class="nav-link">Charts</a>
      <a href="index.html" class="nav-link">Screener</a>
    </nav>
  </header>

  <main>
    <div class="asset-header">
      <h2 class="asset-title" id="asset-title"></h2>
    </div>

    <div class="chart-container">
      <div class="chart-toolbar">
        <div class="toolbar-left">
          <div class="chart-title">
            <span class="symbol" id="chart-symbol"></span>
            <span class="price" id="current-price"></span>
            <span class="change" id="price-change"></span>
          </div>
          <div class="overlay-tags" id="overlay-tags"></div>
        </div>
        <div class="toolbar-right">
          <div class="chart-type-selector">
            <button class="type-btn active" data-type="line" title="Line">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M2 14L6 8L10 10L16 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="type-btn" data-type="line-area" title="Line Area">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M2 14L6 8L10 10L16 4V14H2Z" fill="currentColor" opacity="0.2"/>
                <path d="M2 14L6 8L10 10L16 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="type-btn" data-type="bar" title="Bar">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <rect x="2" y="8" width="3" height="8" fill="currentColor"/>
                <rect x="7" y="4" width="3" height="12" fill="currentColor"/>
                <rect x="12" y="6" width="3" height="10" fill="currentColor"/>
              </svg>
            </button>
            <button class="type-btn" data-type="bar-area" title="Bar Area">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <rect x="2" y="8" width="3" height="8" fill="currentColor" opacity="0.4"/>
                <rect x="7" y="4" width="3" height="12" fill="currentColor" opacity="0.4"/>
                <rect x="12" y="6" width="3" height="10" fill="currentColor" opacity="0.4"/>
                <path d="M3.5 8L8.5 4L13.5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <div class="timeframe-selector">
            <button class="tf-btn" data-tf="1D">1D</button>
            <button class="tf-btn" data-tf="1W">1W</button>
            <button class="tf-btn active" data-tf="1M">1M</button>
            <button class="tf-btn" data-tf="3M">3M</button>
            <button class="tf-btn" data-tf="1Y">1Y</button>
            <button class="tf-btn" data-tf="5Y">5Y</button>
          </div>
        </div>
      </div>
      <div class="chart-area">
        <div id="custom-axes"></div>
        <div id="chart"></div>
      </div>
    </div>

    <!-- Main Metrics Table -->
    <div class="metrics-section" id="metrics-section">
      <div class="metrics-header">
        <h2 class="metrics-title">Metrics</h2>
        <button class="collapse-btn" id="metrics-collapse-btn" title="Collapse">&#9650;</button>
      </div>
      <div class="metrics-body" id="metrics-body">
        <table class="metrics-table" id="metrics-table">
          <thead id="metrics-thead"></thead>
          <tbody id="metrics-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Detail Table (shown when a metric column is clicked) -->
    <div class="detail-section" id="detail-section" style="display:none;">
      <div class="detail-header">
        <h2 class="detail-title" id="detail-title"></h2>
        <button class="close-btn" id="detail-close-btn" title="Close">&times;</button>
      </div>
      <div class="detail-body" id="detail-body"></div>
    </div>
  </main>

  <script src="data.js?v=15"></script>
  <script src="asset.js?v=15"></script>
</body>
</html>
